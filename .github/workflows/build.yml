name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            binary_name: metamorphoun
            asset_name: metamorphoun-linux-amd64
          - os: windows-latest
            binary_name: Metamorphoun.exe
            asset_name: Metamorphoun-windows-amd64.exe
          - os: macos-latest
            binary_name: metamorphoun
            asset_name: metamorphoun-macos-amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev

    - name: Get dependencies
      run: go mod download

    - name: Build (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: go build -v -o ${{ matrix.binary_name }}

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: go build -v -ldflags="-H=windowsgui" -o ${{ matrix.binary_name }}

    - name: Test
      if: matrix.os != 'ubuntu-latest'
      run: go test -v ./...

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.binary_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          metamorphoun-linux-amd64/metamorphoun
          Metamorphoun-windows-amd64.exe/Metamorphoun.exe
          metamorphoun-macos-amd64/metamorphoun
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
