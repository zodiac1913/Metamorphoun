	import comms from './scripts/comms.js'; 
	import boom from './scripts/dynamite.js'; 
    import {jsonToHtml} from './scripts/cc/ccUtilities.js'
	window.comms=new comms({server: "http://127.0.0.1:3000"});
	window.tnt=new boom();
    let config=await window.comms.getConfig();
    let currentPic=config.picHistories.find(ph=>ph.picNum===0);

    let randomIIPicked={i:"ImageItemData",c:"bg-AliceBlue fw-bolder text-FireBrick",b:[]}
    let flexRow1={i:"ImageItemDataFlexRow1",c:"d-flex flex-row mb-3",b:[]}
    flexRow1.b.push(
        {i:"op",c:"p-2 fw-bold",t:"Operation: ",b:[{i:"opVal",c:"text-Maroon float-end ms-2 fst-italic",t: currentPic.imageItem.operation}]},
        {i:"loc",c:"p-2 fw-bold",t:"Location: ",b:[{i:"locVal",c:"text-Maroon float-end ms-2 fst-italic",t: currentPic.imageItem.location}]},
    )




    randomIIPicked.b.push(flexRow1);
    document.querySelector("#infoPic").insertAdjacentHTML("beforeend",jsonToHtml(randomIIPicked))
